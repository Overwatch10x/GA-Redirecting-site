<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Redirecting...</title>
    <!-- Google Analytics -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=GA_MEASUREMENT_ID"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());

      gtag('config', 'GA_MEASUREMENT_ID', {
        'send_page_view': true,
        'transport_type': 'beacon'
      });
    </script>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background-color: #f4f4f9;
        }
        .container {
            text-align: center;
        }
        .spinner {
            border: 4px solid rgba(0, 0, 0, 0.1);
            width: 36px;
            height: 36px;
            border-radius: 50%;
            border-left-color: #09f;
            animation: spin 1s linear infinite;
            display: inline-block;
            margin-bottom: 20px;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="spinner"></div>
        <p>Redirecting you to your destination...</p>
    </div>

    <script>
        (function() {
            const destBase = "REDIRECT_URL";
            const currentUrl = new URL(window.location.href);
            
            // Handle case where REDIRECT_URL might not have a protocol
            let finalDestBase = destBase;
            if (!destBase.startsWith('http')) {
                finalDestBase = 'https://' + destBase;
            }

            const destUrl = new URL(finalDestBase);
            
            // Forward all search parameters (UTMs, etc.)
            currentUrl.searchParams.forEach((value, key) => {
                destUrl.searchParams.set(key, value);
            });

            // We use a small delay to ensure GA beacon has a chance to fire
            // 'transport_type': 'beacon' helps with this as well.
            setTimeout(() => {
                window.location.href = destUrl.toString();
            }, 800);
        })();
    </script>
</body>
</html>
